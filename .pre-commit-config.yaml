minimum_pre_commit_version: '3.2.0'
default_install_hook_types:
  - pre-commit
  - commit-msg
default_stages:
  - pre-commit

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-yaml
      - id: destroyed-symlinks
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args:
          - --fix=lf
      - id: trailing-whitespace

  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: 9257c6050c0261b8c57e712f632dc4a8010109a9 # v1.25.2
    hooks:
      - id: zizmor
        args:
          - --offline
          - .github/workflows
          - action.yml

  - repo: local
    hooks:
      - id: deno-fmt
        name: deno fmt
        entry: deno task check:format
        language: system
        pass_filenames: false
        files: &project_files >-
          (?x)^(
            \.editorconfig|
            \.dvmrc|
            \.github/workflows/.+\.ya?ml|
            \.pre-commit-config\.yaml|
            \.pre-commit-hooks\.yaml|
            action\.yml|
            deno\.json|
            deno\.lock|
            Dockerfile|
            hooks/.+|
            README\.md|
            src/.+\.ts
          )$

      - id: deno-lint
        name: deno lint
        entry: deno task check:lint
        language: system
        pass_filenames: false
        files: *project_files

      - id: deno-check
        name: deno check
        entry: deno task check:types
        language: system
        pass_filenames: false
        files: *project_files

      - id: deno-test
        name: deno test
        entry: deno task check:test
        language: system
        pass_filenames: false
        files: *project_files

      - id: wrapscallion
        name: wrapscallion
        entry: deno run --allow-read --allow-env src/main.ts --output-format json --edit
        language: system
        stages:
          - commit-msg
