name: ci

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  merge_group:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version-file: .dvmrc

      - run: deno task check

  build:
    name: build (${{ matrix.arch }})
    if: ${{ github.event_name != 'push' }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read # check out the source to build and smoke-test the image
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: ./.github/actions/build-image
        with:
          platform: ${{ matrix.platform }}

  build-and-publish:
    name: build-and-publish
    if: ${{ github.event_name == 'push' }}
    permissions:
      contents: read # check out the source to build the image
      packages: write # push the branch-tagged image and index to GHCR
      id-token: write # OIDC for the release-index provenance attestation
      attestations: write # write the release-index provenance attestation
    uses: ./.github/workflows/build.yml
    with:
      push: true
