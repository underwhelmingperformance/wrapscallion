name: ci

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  merge_group:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version-file: .dvmrc

      - run: deno task check

  build:
    name: build (${{ matrix.arch }})
    if: ${{ github.event_name != 'push' }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read # check out the source to build and smoke-test the image
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: ./.github/actions/build-image
        with:
          platform: ${{ matrix.platform }}

  build-and-publish:
    name: build-and-publish
    if: ${{ github.event_name == 'push' }}
    permissions:
      contents: read # check out the source to build the image
      packages: write # push the branch-tagged image and index to GHCR
      id-token: write # OIDC for the release-index provenance attestation
      attestations: write # write the release-index provenance attestation
    uses: ./.github/workflows/build.yml
    with:
      push: true
