name: actions-lint

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install actionlint
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tmp="$(mktemp -d)"
          gh release download v1.7.12 \
            --repo rhysd/actionlint \
            --pattern actionlint_1.7.12_checksums.txt \
            --pattern actionlint_1.7.12_linux_amd64.tar.gz \
            --dir "$tmp"

          (
            cd "$tmp"
            grep ' actionlint_1.7.12_linux_amd64.tar.gz$' actionlint_1.7.12_checksums.txt | sha256sum -c -
          )

          tar -xzf "${tmp}/actionlint_1.7.12_linux_amd64.tar.gz" -C "${tmp}"
          install -m 0755 "${tmp}/actionlint" "${RUNNER_TEMP}/actionlint"
          echo "${RUNNER_TEMP}" >> "${GITHUB_PATH}"

      - run: actionlint -no-color

  zizmor:
    name: zizmor
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
          annotations: true
          inputs: .github/workflows action.yml
          version: 1.25.2
