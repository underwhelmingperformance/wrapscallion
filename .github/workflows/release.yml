name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v, e.g. 0.2.0
        required: true
        type: string

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check:
    name: check
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Validate version
        run: |
          set -euo pipefail

          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must be MAJOR.MINOR.PATCH (no leading v), got: ${VERSION}" >&2
            exit 1
          fi

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version-file: .dvmrc

      - run: deno task check

  build:
    name: build
    needs: check
    permissions:
      contents: read # check out the source to build the image
      packages: write # push the per-arch images and index to GHCR
    uses: ./.github/workflows/build.yml
    with:
      push: true
      version: ${{ inputs.version }}

  release:
    name: release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write # push the release commit + tag and create the release
      packages: write # attach the provenance attestation to the image
      id-token: write # OIDC for build provenance attestation
      attestations: write # write the build provenance attestation
    env:
      VERSION: ${{ inputs.version }}
      IMAGE: ${{ needs.build.outputs.image }}
      DIGEST: ${{ needs.build.outputs.digest }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # push-to-registry attaches the attestation to the image in GHCR, which
      # needs registry credentials just like pushing the image itself does.
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ needs.build.outputs.image }}
          subject-digest: ${{ needs.build.outputs.digest }}
          push-to-registry: true

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version-file: .dvmrc

      - name: Set package version
        run: |
          set -euo pipefail

          jq --arg v "${VERSION}" '.version = $v' deno.json > deno.json.tmp
          mv deno.json.tmp deno.json
          deno fmt deno.json

      - name: Pin the pre-commit hook to the released image
        run: |
          set -euo pipefail

          # The committed manifest builds the hook image from the Dockerfile so
          # it works on any checkout. A release instead pins the published,
          # attested image by digest, so patch only the two fields that differ.
          yq --inplace '
            (.[] | select(.id == "wrapscallion")) |= (
              .language = "docker_image" |
              .entry = strenv(IMAGE) + "@" + strenv(DIGEST) + " --output-format json --edit"
            )
          ' .pre-commit-hooks.yaml

          deno fmt .pre-commit-hooks.yaml deno.json

      - name: Compile standalone binaries
        run: |
          set -euo pipefail

          mkdir -p dist

          for target in \
            x86_64-unknown-linux-gnu \
            aarch64-unknown-linux-gnu \
            x86_64-pc-windows-msvc \
            x86_64-apple-darwin \
            aarch64-apple-darwin; do
            output="dist/wrapscallion-${VERSION}-${target}"

            if [[ "${target}" == *windows* ]]; then
              output="${output}.exe"
            fi

            deno compile \
              --frozen \
              --allow-read \
              --allow-write \
              --allow-env \
              --target "${target}" \
              --output "${output}" \
              src/main.ts
          done

          (cd dist && sha256sum wrapscallion-* > SHA256SUMS)

      - name: Attest the standalone binaries
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/wrapscallion-*

      - name: Create signed tag and draft release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const { owner, repo } = context.repo;
            const tag = `v${process.env.VERSION}`;

            // Build the release commit through the API so GitHub signs it: the
            // tag then carries a verified signature even though it is created in
            // CI. Parent it on the exact commit this run was triggered at, which
            // is the tree checkout fetched and the checks validated. The tag
            // hangs off that commit and main stays where it is, so this plays
            // nicely with a protected, PR-only main branch.
            const baseSha = context.sha;
            const baseCommit = await github.rest.git.getCommit({
              owner,
              repo,
              commit_sha: baseSha,
            });

            const blob = async (path) =>
              (await github.rest.git.createBlob({
                owner,
                repo,
                encoding: "base64",
                content: fs.readFileSync(path).toString("base64"),
              })).data.sha;

            const tree = await github.rest.git.createTree({
              owner,
              repo,
              base_tree: baseCommit.data.tree.sha,
              tree: [
                { path: "deno.json", mode: "100644", type: "blob", sha: await blob("deno.json") },
                { path: ".pre-commit-hooks.yaml", mode: "100644", type: "blob", sha: await blob(".pre-commit-hooks.yaml") },
              ],
            });

            const commit = await github.rest.git.createCommit({
              owner,
              repo,
              message: `chore(release): ${tag}`,
              tree: tree.data.sha,
              parents: [baseSha],
            });

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tag}`,
              sha: commit.data.sha,
            });

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: tag,
              draft: true,
              generate_release_notes: true,
            });

      - name: Attach the standalone binaries to the release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          gh release upload "v${VERSION}" dist/wrapscallion-* dist/SHA256SUMS --clobber
