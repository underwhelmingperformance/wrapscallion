name: release

# Cutting a release is a two-stage flow. release-please keeps a "release"
# pull request up to date that bumps the version in deno.json and the pinned
# examples in the README. Merging that pull request is what triggers this
# workflow: it builds and publishes the image, then hangs the vX.Y.Z tag off a
# child commit that pins the pre-commit hook to the freshly published digest.
# That digest is only known after the build, so it cannot live in the merged
# commit; main therefore advances through the normal protected pull request and
# the tag carries the release-only changes.

on:
  pull_request:
    types:
      - closed

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare
    # Only the merged release-please pull request reaches the rest of the flow.
    # release-please labels it "autorelease: pending"; an ordinary merge has no
    # such label and is ignored.
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'autorelease: pending')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha: ${{ steps.version.outputs.sha }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          persist-credentials: false

      - name: Read the released version
        id: version
        env:
          SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail

          version=$(jq -r '."."' .release-please-manifest.json)

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "manifest version must be MAJOR.MINOR.PATCH, got: ${version}" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "sha=${SHA}" >> "${GITHUB_OUTPUT}"

  build:
    name: build
    needs: prepare
    permissions:
      contents: read # check out the source to build the image
      packages: write # push the per-arch images and index to GHCR
    uses: ./.github/workflows/build.yml
    with:
      push: true
      version: ${{ needs.prepare.outputs.version }}
      ref: ${{ needs.prepare.outputs.sha }}

  release:
    name: release
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write # create the tag (off main) and the release
      packages: write # attach the provenance attestation to the image
      id-token: write # OIDC for build provenance attestation
      attestations: write # write the build provenance attestation
      artifact-metadata: write # link the pushed image on the org's artifacts page
      issues: write # ensure the autorelease label exists
      pull-requests: write # mark the release pull request as tagged
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      BASE_SHA: ${{ needs.prepare.outputs.sha }}
      IMAGE: ${{ needs.build.outputs.image }}
      DIGEST: ${{ needs.build.outputs.digest }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          persist-credentials: false

      # push-to-registry attaches the attestation to the image in GHCR, which
      # needs registry credentials just like pushing the image itself does.
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ needs.build.outputs.image }}
          subject-digest: ${{ needs.build.outputs.digest }}
          push-to-registry: true

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version-file: .dvmrc

      - name: Pin the pre-commit hook to the released image
        run: |
          set -euo pipefail

          # The committed manifest builds the hook image from the Dockerfile so
          # it works on any checkout. A release instead pins the published,
          # attested image by digest, so patch only the two fields that differ.
          # The version already landed on main through the release pull request;
          # this digest is the only release-only change, so it is all the tag
          # commit carries on top of the merged commit.
          yq --inplace '
            (.[] | select(.id == "wrapscallion")) |= (
              .language = "docker_image" |
              .entry = strenv(IMAGE) + "@" + strenv(DIGEST) + " --output-format json --edit"
            )
          ' .pre-commit-hooks.yaml

          deno fmt .pre-commit-hooks.yaml

      - name: Compile standalone binaries
        run: |
          set -euo pipefail

          mkdir -p dist

          for target in \
            x86_64-unknown-linux-gnu \
            aarch64-unknown-linux-gnu \
            x86_64-pc-windows-msvc \
            x86_64-apple-darwin \
            aarch64-apple-darwin; do
            output="dist/wrapscallion-${VERSION}-${target}"

            if [[ "${target}" == *windows* ]]; then
              output="${output}.exe"
            fi

            deno compile \
              --frozen \
              --allow-read \
              --allow-write \
              --allow-env \
              --target "${target}" \
              --output "${output}" \
              src/main.ts
          done

          (cd dist && sha256sum wrapscallion-* > SHA256SUMS)

      - name: Attest the standalone binaries
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/wrapscallion-*

      - name: Create signed tag and draft release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const { owner, repo } = context.repo;
            const tag = `v${process.env.VERSION}`;

            // Build the release commit through the API so GitHub signs it: the
            // tag then carries a verified signature even though it is created in
            // CI. Parent it on the merged release commit, which already carries
            // the version bump. The tag hangs off that commit with only the
            // pinned digest added, and main is left where the merge put it, so
            // this plays nicely with a protected, PR-only main branch.
            const baseSha = process.env.BASE_SHA;
            const baseCommit = await github.rest.git.getCommit({
              owner,
              repo,
              commit_sha: baseSha,
            });

            const blob = async (path) =>
              (await github.rest.git.createBlob({
                owner,
                repo,
                encoding: "base64",
                content: fs.readFileSync(path).toString("base64"),
              })).data.sha;

            const tree = await github.rest.git.createTree({
              owner,
              repo,
              base_tree: baseCommit.data.tree.sha,
              tree: [
                { path: ".pre-commit-hooks.yaml", mode: "100644", type: "blob", sha: await blob(".pre-commit-hooks.yaml") },
              ],
            });

            const commit = await github.rest.git.createCommit({
              owner,
              repo,
              message: `chore(release): ${tag}`,
              tree: tree.data.sha,
              parents: [baseSha],
            });

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tag}`,
              sha: commit.data.sha,
            });

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: tag,
              draft: true,
              generate_release_notes: true,
            });

      - name: Attach the standalone binaries to the release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          gh release upload "v${VERSION}" dist/wrapscallion-* dist/SHA256SUMS --clobber

      # release-please tracks state through the pull request label and updates
      # it when it tags a release. This workflow does the tagging, so flip the
      # label ourselves; otherwise the next run aborts with "untagged, merged
      # release PRs outstanding" and stops opening new release pull requests.
      - name: Mark the release pull request as tagged
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          gh label create 'autorelease: tagged' --color ededed --force
          gh pr edit "${PR_NUMBER}" \
            --remove-label 'autorelease: pending' \
            --add-label 'autorelease: tagged'
