name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v, e.g. 0.2.0
        required: true
        type: string

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-24.04
    permissions:
      contents: write # push the release commit + tag and create the release
      packages: write # push the image to GHCR
      id-token: write # OIDC for build provenance attestation
      attestations: write # write the build provenance attestation
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Resolve version and image
        run: |
          set -euo pipefail

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must be MAJOR.MINOR.PATCH (no leading v), got: $VERSION" >&2
            exit 1
          fi

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "IMAGE=ghcr.io/${owner}/wrapscallion" >> "$GITHUB_ENV"

      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version-file: .dvmrc

      - run: deno task check

      - name: Set package version
        run: |
          set -euo pipefail

          jq --arg v "$VERSION" '.version = $v' deno.json > deno.json.tmp
          mv deno.json.tmp deno.json
          deno fmt deno.json

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:${{ env.VERSION }}

      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Pin pre-commit hook
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail

          printf '%s\n' \
            '- id: wrapscallion' \
            '  name: wrapscallion' \
            '  description: Lint Conventional Commit messages and 72-column bodies.' \
            "  entry: ${IMAGE}@${DIGEST} --output-format json --edit" \
            '  language: docker_image' \
            '  stages:' \
            '    - commit-msg' \
            '' \
            '- id: wrapscallion-system' \
            '  name: wrapscallion (system Deno)' \
            '  description: Lint Conventional Commit messages using deno from PATH.' \
            '  entry: hooks/wrapscallion' \
            '  language: script' \
            '  stages:' \
            '    - commit-msg' \
            > .pre-commit-hooks.yaml

          deno fmt .pre-commit-hooks.yaml deno.json

      - name: Create signed tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Build the release commit through the API so GitHub signs it: the tag
          # then carries a verified signature even though it is created in CI.
          # The commit hangs off main via the tag only; main is not moved, so it
          # plays nicely with a protected, PR-only main branch.
          base_sha=$(gh api "repos/${REPO}/git/ref/heads/main" --jq .object.sha)
          base_tree=$(gh api "repos/${REPO}/git/commits/${base_sha}" --jq .tree.sha)
          deno_blob=$(gh api "repos/${REPO}/git/blobs" \
            -f encoding=base64 -f content="$(base64 -w0 deno.json)" --jq .sha)
          hooks_blob=$(gh api "repos/${REPO}/git/blobs" \
            -f encoding=base64 -f content="$(base64 -w0 .pre-commit-hooks.yaml)" --jq .sha)
          tree_sha=$(jq -n \
            --arg bt "$base_tree" --arg d "$deno_blob" --arg h "$hooks_blob" \
            '{base_tree: $bt, tree: [
              {path: "deno.json", mode: "100644", type: "blob", sha: $d},
              {path: ".pre-commit-hooks.yaml", mode: "100644", type: "blob", sha: $h}
            ]}' | gh api "repos/${REPO}/git/trees" --input - --jq .sha)
          commit_sha=$(jq -n \
            --arg m "chore(release): v${VERSION}" --arg t "$tree_sha" --arg p "$base_sha" \
            '{message: $m, tree: $t, parents: [$p]}' \
            | gh api "repos/${REPO}/git/commits" --input - --jq .sha)

          gh api --method POST "repos/${REPO}/git/refs" \
            -f ref="refs/tags/v${VERSION}" -f sha="$commit_sha"

          gh release create "v${VERSION}" \
            --verify-tag \
            --generate-notes \
            --title "v${VERSION}"
