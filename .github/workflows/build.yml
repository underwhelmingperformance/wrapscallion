name: build

# This is a reusable workflow. GitHub checks a called workflow's permissions
# against the caller as a whole -- the union across its jobs, including ones a
# given call skips -- so every caller grants the full set the jobs declare:
# contents: read to build, packages: write to push, and id-token plus
# attestations: write to attest the release index.

on:
  workflow_call:
    inputs:
      push:
        description: Push the per-arch images and assemble the multi-arch index.
        required: false
        type: boolean
        default: false
      version:
        description: Release version without the leading v, used for image tags.
        required: false
        type: string
        default: ''
      ref:
        description: Commit to check out and build. Defaults to the caller's ref.
        required: false
        type: string
        default: ''
    outputs:
      image:
        description: The image repository the build pushed to.
        value: ${{ jobs.merge.outputs.image }}
      digest:
        description: The digest of the pushed multi-arch index.
        value: ${{ jobs.merge.outputs.digest }}

permissions: {}

jobs:
  build:
    name: build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read # check out the source to build the image
      packages: write # push the per-arch image by digest when inputs.push
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Resolve image
        id: image
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          echo "image=ghcr.io/${OWNER,,}/wrapscallion" >> "${GITHUB_OUTPUT}"

      - name: Set package version
        if: ${{ inputs.version != '' }}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          # Bake the release version into the image so it matches the commit the
          # release tag will point at. Nothing in the lock depends on it.
          tmp=$(mktemp)
          jq --arg v "${VERSION}" '.version = $v' deno.json > "${tmp}"
          mv "${tmp}" deno.json

      # Build, load and smoke-test the image. The push step below rebuilds from
      # the same context and hits the buildx cache, so this does not double the
      # work.
      - uses: ./.github/actions/build-image
        with:
          platform: ${{ matrix.platform }}

      - name: Log in to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push the image for ${{ matrix.platform }}
        id: build
        if: ${{ inputs.push }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false
          outputs: type=image,name=${{ steps.image.outputs.image }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        if: ${{ inputs.push }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail

          mkdir -p "${RUNNER_TEMP}/digests"
          touch "${RUNNER_TEMP}/digests/${DIGEST#sha256:}"

      - name: Upload digest
        if: ${{ inputs.push }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: merge
    if: ${{ inputs.push }}
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read # read the per-arch digest artifacts from this run
      packages: write # push the assembled index
      id-token: write # OIDC for the release-index provenance attestation
      attestations: write # write the release-index provenance attestation
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.index.outputs.digest }}
    steps:
      - name: Resolve image
        id: image
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          echo "image=ghcr.io/${OWNER,,}/wrapscallion" >> "${GITHUB_OUTPUT}"

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ steps.image.outputs.image }}
          flavor: latest=false
          tags: |
            type=ref,event=pr,enable=${{ inputs.version != '' }}
            type=ref,event=branch,enable=${{ inputs.version == '' }}

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble and push the index
        id: assemble
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          TAGS_JSON: ${{ steps.meta.outputs.json }}
        run: |
          set -euo pipefail

          mapfile -t tags < <(jq -r '.tags[]' <<< "${TAGS_JSON}")
          sources=()
          for digest in *; do
            sources+=("${IMAGE}@sha256:${digest}")
          done

          docker buildx imagetools create \
            "${tags[@]/#/--tag=}" \
            "${sources[@]}"

          echo "tag=${tags[0]}" >> "${GITHUB_OUTPUT}"

      - name: Capture index digest
        id: index
        env:
          TAG: ${{ steps.assemble.outputs.tag }}
        run: |
          set -euo pipefail

          digest=$(docker buildx imagetools inspect "${TAG}" \
            --format '{{.Manifest.Digest}}')
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"

      # A release version is set only for release candidates; branch images
      # leave it empty and stay out of the public transparency log.
      - name: Attest the index
        if: ${{ inputs.version != '' }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.image.outputs.image }}
          subject-digest: ${{ steps.index.outputs.digest }}
          push-to-registry: true
